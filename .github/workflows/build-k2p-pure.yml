name: Build Pure K2P Padavan KVR
on:
  workflow_dispatch:
    inputs:
      clean:
        description: 编译前清理缓存
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y autoconf automake bison build-essential flex gawk gettext git libncurses-dev libssl-dev libtool m4 pkg-config unzip zlib1g-dev python3

      - name: 配置纯净编译参数（仅K2P、全关多余插件、强制开启KVR）
        run: |
          cat > .config << EOF
# 目标机型锁定K2P
CONFIG_TARGET_K2P=y

# 基础WEB后台必开
CONFIG_FIRMWARE_INCLUDE_LUCI=y

# 存储/文件服务全部关闭
CONFIG_FIRMWARE_INCLUDE_SMBD=n
CONFIG_FIRMWARE_INCLUDE_FTP=n
CONFIG_FIRMWARE_INCLUDE_NFS=n

# DDNS/动态域名关闭
CONFIG_FIRMWARE_INCLUDE_DDNS_SYNCNT=n
CONFIG_FIRMWARE_INCLUDE_DDNS_NOIP=n
CONFIG_FIRMWARE_INCLUDE_DDNS_DYNDNS=n

# 下载工具全部关闭
CONFIG_FIRMWARE_INCLUDE_TRANSMISSION=n
CONFIG_FIRMWARE_INCLUDE_AIRA2=n
CONFIG_FIRMWARE_INCLUDE_QBITTORRENT=n

# 各类代理/魔法插件全部关闭
CONFIG_FIRMWARE_INCLUDE_V2RAY=n
CONFIG_FIRMWARE_INCLUDE_XRAY=n
CONFIG_FIRMWARE_INCLUDE_OPENVPN=n
CONFIG_FIRMWARE_INCLUDE_WIREGUARD=n
CONFIG_FIRMWARE_INCLUDE_SS=n
CONFIG_FIRMWARE_INCLUDE_SSR=n

# 广告过滤、DNS增强关闭
CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=n
CONFIG_FIRMWARE_INCLUDE_SMARTDNS=n

# 增值小工具关闭
CONFIG_FIRMWARE_INCLUDE_KMS=n
CONFIG_FIRMWARE_INCLUDE_WOL=n
CONFIG_FIRMWARE_INCLUDE_UPNP_TOOLS=n
CONFIG_FIRMWARE_INCLUDE_IPTV=n
CONFIG_FIRMWARE_INCLUDE_MULTIWAN=n
CONFIG_FIRMWARE_INCLUDE_QOS=n
CONFIG_FIRMWARE_INCLUDE_FLOW_OFFLOAD=n

# 无线KVR强制开启（核心）
CONFIG_WIFI_KVR_SUPPORT=y
CONFIG_WIFI_80211R=y
CONFIG_WIFI_80211K=y
CONFIG_WIFI_80211V=y
CONFIG_WIFI_IAPP_SUPPORT=y

# 无线驱动完整启用MT7615
CONFIG_WIFI_DRIVER_FULL=y
EOF

      - name: 开始编译固件
        run: |
          make clean
          make -j$(nproc)

      - name: 打包固件产物
        run: |
          mkdir -p output_firmware
          cp ./bin/K2P/*.trx output_firmware/
          cp ./bin/K2P/*.md5 output_firmware/
          ls -lh output_firmware

      - name: 上传固件到Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: K2P-Pure-KVR-Firmware
          path: output_firmware
          retention-days: 30
