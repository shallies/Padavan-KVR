name: Build Pure K2P Padavan KVR
on:
  workflow_dispatch:
    inputs:
      clean:
        description: 编译前清理缓存
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装编译依赖
        run:
          if [ -f "/etc/apt/sources.list.d/google-chrome.list" ]; then
            sudo sed -i '/dl.google.com/d' /etc/apt/sources.list.d/google-chrome.list
          fi
          sudo apt update
          sudo apt install -y autoconf automake bison build-essential flex gawk gettext git libncurses-dev libssl-dev libtool m4 pkg-config unzip zlib1g-dev python3 python3-docutils
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 生成纯净配置
        run:
          echo "CONFIG_TARGET_K2P=y" > .config
          echo "CONFIG_FIRMWARE_INCLUDE_LUCI=y" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_SMBD=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_MSD_LITE=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_SAMBA=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_FTP=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_NFS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_DDNS_SYNCNT=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_DDNS_NOIP=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_DDNS_DYNDNS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_TRANSMISSION=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_AIRA2=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_QBITTORRENT=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_V2RAY=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_XRAY=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_OPENVPN=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_WIREGUARD=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_SS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_SSR=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_KMS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_WOL=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_UPNP_TOOLS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_IPTV=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_MULTIWAN=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_QOS=n" >> .config
          echo "CONFIG_FIRMWARE_INCLUDE_FLOW_OFFLOAD=n" >> .config
          echo "CONFIG_WIFI_KVR_SUPPORT=y" >> .config
          echo "CONFIG_WIFI_80211R=y" >> .config
          echo "CONFIG_WIFI_80211K=y" >> .config
          echo "CONFIG_WIFI_80211V=y" >> .config
          echo "CONFIG_WIFI_IAPP_SUPPORT=y" >> .config
          echo "CONFIG_WIFI_DRIVER_FULL=y" >> .config

      - name: 修复GCC警告参数
        run:
          find . -name "CMakeLists.txt" -o -name "Makefile" -exec sed -i '/Wno-unsafe-buffer-usage/d' {} \;
          export CFLAGS="-Wno-return-type"

      - name: 编译固件
        run:
          make clean
          make -j$(nproc)

      - name: 打包固件
        run:
          mkdir -p output_firmware
          cp ./bin/K2P/*.trx output_firmware/
          cp ./bin/K2P/*.md5 output_firmware/
          ls -lh output_firmware

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2P-Pure-KVR-Firmware
          path: output_firmware
          retention-days: 30
